name: Move referenced issues to In review

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  issues: read

env:
  PROJECT_OWNER: ${{ github.repository_owner }}

  # Deja aquí el número que ya estás usando.
  PROJECT_NUMBER: "3"

  STATUS_FIELD_NAME: "Status"
  IN_REVIEW_OPTION_NAME: "In review"

jobs:
  move-issues-to-in-review:
    name: Move issues and subissues to In review
    runs-on: ubuntu-latest

    if: github.event.deleted == false

    env:
      GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}

    steps:
      - name: Find issues referenced by commits
        id: referenced-issues
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY' > /tmp/issues.txt
          import json
          import os
          import re

          with open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8") as file:
              event = json.load(file)

          current_repository = os.environ["GITHUB_REPOSITORY"].lower()

          # Reconoce:
          # Closes #2
          # Fixes: #2
          # Resolves armiiin-13/github-playground#2
          pattern = re.compile(
              r"""
              \b
              (?:
                  close[sd]?
                | fix(?:e[sd])?
                | resolve[sd]?
              )
              \s*:?\s*
              (?:(?P<repository>[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+))?
              \#(?P<number>\d+)
              \b
              """,
              re.IGNORECASE | re.VERBOSE,
          )

          issue_numbers = set()

          for commit in event.get("commits", []):
              message = commit.get("message", "")

              for match in pattern.finditer(message):
                  referenced_repository = match.group("repository")

                  if (
                      referenced_repository is None
                      or referenced_repository.lower() == current_repository
                  ):
                      issue_numbers.add(int(match.group("number")))

          for number in sorted(issue_numbers):
              print(number)
          PY

          if [[ ! -s /tmp/issues.txt ]]; then
            echo "No closing issue references found."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Referenced issues:"
          cat /tmp/issues.txt

          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Get personal project data
        if: steps.referenced-issues.outputs.found == 'true'
        id: project
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_QUERY=$(cat <<'GRAPHQL'
          query(
            $owner: String!,
            $number: Int!
          ) {
            user(login: $owner) {
              projectV2(number: $number) {
                id

                fields(first: 100) {
                  nodes {
                    ... on ProjectV2SingleSelectField {
                      id
                      name

                      options {
                        id
                        name
                      }
                    }
                  }
                }
              }
            }
          }
          GRAPHQL
          )

          PROJECT_JSON="$(
            gh api graphql \
              -f query="$PROJECT_QUERY" \
              -f owner="$PROJECT_OWNER" \
              -F number="$PROJECT_NUMBER" \
            | jq -c '.data.user.projectV2'
          )"

          if [[ "$PROJECT_JSON" == "null" ]]; then
            echo "::error::Personal project ${PROJECT_OWNER}/${PROJECT_NUMBER} not found."
            exit 1
          fi

          PROJECT_ID="$(
            jq -r '.id' <<< "$PROJECT_JSON"
          )"

          STATUS_FIELD_ID="$(
            jq -r \
              --arg field "$STATUS_FIELD_NAME" \
              '
              [
                .fields.nodes[]
                | select(.name == $field)
                | .id
              ][0] // empty
              ' \
              <<< "$PROJECT_JSON"
          )"

          IN_REVIEW_OPTION_ID="$(
            jq -r \
              --arg field "$STATUS_FIELD_NAME" \
              --arg option "$IN_REVIEW_OPTION_NAME" \
              '
              [
                .fields.nodes[]
                | select(.name == $field)
                | .options[]?
                | select(.name == $option)
                | .id
              ][0] // empty
              ' \
              <<< "$PROJECT_JSON"
          )"

          if [[ -z "$STATUS_FIELD_ID" ]]; then
            echo "::error::Field '${STATUS_FIELD_NAME}' not found."
            exit 1
          fi

          if [[ -z "$IN_REVIEW_OPTION_ID" ]]; then
            echo "::error::Option '${IN_REVIEW_OPTION_NAME}' not found."
            exit 1
          fi

          {
            echo "project_id=$PROJECT_ID"
            echo "status_field_id=$STATUS_FIELD_ID"
            echo "in_review_option_id=$IN_REVIEW_OPTION_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Move issues and subissues to In review
        if: steps.referenced-issues.outputs.found == 'true'
        shell: bash
        env:
          PROJECT_ID: ${{ steps.project.outputs.project_id }}
          STATUS_FIELD_ID: ${{ steps.project.outputs.status_field_id }}
          IN_REVIEW_OPTION_ID: ${{ steps.project.outputs.in_review_option_id }}
        run: |
          set -euo pipefail

          REPOSITORY_OWNER="${GITHUB_REPOSITORY%%/*}"
          REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"

          ISSUE_QUERY=$(cat <<'GRAPHQL'
          query(
            $owner: String!,
            $repository: String!,
            $number: Int!
          ) {
            repository(owner: $owner, name: $repository) {
              issue(number: $number) {
                number
                state
                url

                projectItems(first: 100) {
                  nodes {
                    id

                    project {
                      id
                    }
                  }
                }

                subIssues(first: 100) {
                  nodes {
                    number
                    state
                    url

                    repository {
                      nameWithOwner
                    }
                  }
                }
              }
            }
          }
          GRAPHQL
          )

          declare -a QUEUE=()

          while IFS= read -r ISSUE_NUMBER; do
            [[ -z "$ISSUE_NUMBER" ]] && continue

            ISSUE_URL="https://github.com/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}"

            QUEUE+=(
              "${REPOSITORY_OWNER}|${REPOSITORY_NAME}|${ISSUE_NUMBER}|${ISSUE_URL}"
            )
          done < /tmp/issues.txt

          declare -A SEEN=()

          while (( ${#QUEUE[@]} > 0 )); do
            CURRENT="${QUEUE[0]}"
            QUEUE=("${QUEUE[@]:1}")

            IFS='|' read -r OWNER REPOSITORY NUMBER URL <<< "$CURRENT"

            ISSUE_KEY="${OWNER}/${REPOSITORY}#${NUMBER}"

            if [[ -n "${SEEN[$ISSUE_KEY]:-}" ]]; then
              continue
            fi

            SEEN["$ISSUE_KEY"]=1

            echo "Processing ${ISSUE_KEY}..."

            if ! ISSUE_JSON="$(
              gh api graphql \
                -f query="$ISSUE_QUERY" \
                -f owner="$OWNER" \
                -f repository="$REPOSITORY" \
                -F number="$NUMBER"
            )"; then
              echo "::warning::Could not read ${ISSUE_KEY}."
              continue
            fi

            ISSUE_EXISTS="$(
              jq -r '.data.repository.issue != null' <<< "$ISSUE_JSON"
            )"

            if [[ "$ISSUE_EXISTS" != "true" ]]; then
              echo "::warning::Issue ${ISSUE_KEY} does not exist."
              continue
            fi

            # Añade todas sus subissues a la cola.
            # Al procesarlas también se encontrarán sus propias subissues.
            while IFS=$'\t' read -r CHILD_REPOSITORY CHILD_NUMBER CHILD_URL; do
              [[ -z "$CHILD_REPOSITORY" ]] && continue

              CHILD_OWNER="${CHILD_REPOSITORY%%/*}"
              CHILD_REPOSITORY_NAME="${CHILD_REPOSITORY#*/}"

              QUEUE+=(
                "${CHILD_OWNER}|${CHILD_REPOSITORY_NAME}|${CHILD_NUMBER}|${CHILD_URL}"
              )
            done < <(
              jq -r '
                .data.repository.issue.subIssues.nodes[]?
                | [
                    .repository.nameWithOwner,
                    (.number | tostring),
                    .url
                  ]
                | @tsv
              ' <<< "$ISSUE_JSON"
            )

            ISSUE_STATE="$(
              jq -r '.data.repository.issue.state' <<< "$ISSUE_JSON"
            )"

            # No sacar de Done una issue ya cerrada.
            if [[ "$ISSUE_STATE" == "CLOSED" ]]; then
              echo "${ISSUE_KEY} is closed; keeping its current status."
              continue
            fi

            PROJECT_ITEM_ID="$(
              jq -r \
                --arg project_id "$PROJECT_ID" \
                '
                [
                  .data.repository.issue.projectItems.nodes[]?
                  | select(.project.id == $project_id)
                  | .id
                ][0] // empty
                ' \
                <<< "$ISSUE_JSON"
            )"

            # Si una subissue no está todavía en el proyecto, la añade.
            if [[ -z "$PROJECT_ITEM_ID" ]]; then
              echo "${ISSUE_KEY} is not in the project. Adding it..."

              if ! PROJECT_ITEM_ID="$(
                gh project item-add "$PROJECT_NUMBER" \
                  --owner "$PROJECT_OWNER" \
                  --url "$URL" \
                  --format json \
                  --jq '.id'
              )"; then
                echo "::warning::Could not add ${ISSUE_KEY} to the project."
                continue
              fi
            fi

            gh project item-edit \
              --id "$PROJECT_ITEM_ID" \
              --project-id "$PROJECT_ID" \
              --field-id "$STATUS_FIELD_ID" \
              --single-select-option-id "$IN_REVIEW_OPTION_ID"

            echo "${ISSUE_KEY} moved to '${IN_REVIEW_OPTION_NAME}'."
          done